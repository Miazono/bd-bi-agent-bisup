# Имя коннектора Trino
connector.name=iceberg
# Тип каталога Iceberg (Hive Metastore)
iceberg.catalog.type=hive_metastore
# URI Hive Metastore из окружения
hive.metastore.uri=${ENV:HIVE_METASTORE_URI}
# Endpoint MinIO/S3 из окружения
hive.s3.endpoint=${ENV:MINIO_ENDPOINT}
# Access key для MinIO/S3 из окружения
hive.s3.aws-access-key=${ENV:MINIO_ROOT_USER}
# Secret key для MinIO/S3 из окружения
hive.s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}
# Включить path-style доступ для MinIO
hive.s3.path-style-access=true
# Формат файлов Iceberg по умолчанию
iceberg.file-format=PARQUET
