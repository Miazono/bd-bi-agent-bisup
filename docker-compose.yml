# docker-compose.yml
# Data Lakehouse stack: MinIO + Hive Metastore + Trino + WrenAI

services:
  # MinIO — объектное хранилище для raw и Iceberg-таблиц
  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2023-10-07T15-07-38Z}
    container_name: lakehouse-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-adminadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-adminadmin}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3


  # metastore-db — PostgreSQL для Hive Metastore
  metastore-db:
    image: postgres:15-alpine
    container_name: lakehouse-metastore-db
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: ${METASTORE_DB_USER:-hive}
      POSTGRES_PASSWORD: ${METASTORE_DB_PASSWORD:-hivehive}
    volumes:
      - metastore-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${METASTORE_DB_USER:-hive} -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 3


  # hive-metastore — каталог Iceberg-таблиц
  hive-metastore:
    build:
      context: .
      dockerfile: ./infra/hive/Dockerfile
    image: local/hive-metastore:4.0.0-s3a
    container_name: lakehouse-hive-metastore
    user: root
    depends_on:
      metastore-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      # Postgres connection через metastore-db service name
      METASTORE_DB_HOSTNAME: metastore-db
      METASTORE_DB_PORT: 5432
      METASTORE_DB_NAME: metastore
      METASTORE_DB_USER: ${METASTORE_DB_USER:-hive}
      METASTORE_DB_PASSWORD: ${METASTORE_DB_PASSWORD:-hivehive}
      HIVE_METASTORE_URI: ${HIVE_METASTORE_URI:-thrift://hive-metastore:9083}
      # S3/MinIO config
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-admin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-adminadmin}
      S3_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      S3_PATH_STYLE_ACCESS: "true"
    ports:
      - "9083:9083"
    entrypoint:
      - /bin/sh
      - -c
      - /opt/hive/conf/render-hive-site.sh && /entrypoint.sh
    volumes:
      - hive-warehouse:/opt/hive/data/warehouse
      - ./infra/hive/render-hive-site.sh:/opt/hive/conf/render-hive-site.sh:ro
      - ./infra/hive/postgresql-42.6.0.jar:/opt/hive/lib/postgresql-42.6.0.jar:ro


  # trino — SQL-движок для lakehouse
  trino:
    image: ${TRINO_IMAGE:-trinodb/trino:414}
    container_name: lakehouse-trino
    depends_on:
      hive-metastore:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ./infra/trino/catalog:/etc/trino/catalog:ro
      - ./infra/trino/config.properties:/etc/trino/config.properties:ro
      - ./infra/trino/jvm.config:/etc/trino/jvm.config:ro

    environment:
      CATALOG_MANAGEMENT: dynamic
      HIVE_METASTORE_URI: ${HIVE_METASTORE_URI}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-adminadmin}
      MINIO_REGION: ${MINIO_REGION}

  bootstrap:
    profiles: ["wrenai"]
    image: ghcr.io/canner/wren-bootstrap:${WREN_BOOTSTRAP_VERSION:-0.1.5}
    container_name: lakehouse-wren-bootstrap
    pull_policy: always
    platform: ${WREN_PLATFORM:-linux/amd64}
    environment:
      DATA_PATH: /app/data
    volumes:
      - wrenai-data:/app/data
    command: /bin/sh /app/init.sh

  wren-engine:
    profiles: ["wrenai"]
    image: ghcr.io/canner/wren-engine:${WREN_ENGINE_VERSION:-0.22.0}
    container_name: lakehouse-wren-engine
    pull_policy: always
    platform: ${WREN_PLATFORM:-linux/amd64}
    depends_on:
      - bootstrap
    expose:
      - "${WREN_ENGINE_PORT:-8080}"
      - "${WREN_ENGINE_SQL_PORT:-7432}"
    volumes:
      - wrenai-data:/usr/src/app/etc
      - ./infra/wrenai/data:/usr/src/app/data

  ibis-server:
    profiles: ["wrenai"]
    image: ghcr.io/canner/wren-engine-ibis:${IBIS_SERVER_VERSION:-0.22.0}
    container_name: lakehouse-wren-ibis
    pull_policy: always
    platform: ${WREN_PLATFORM:-linux/amd64}
    depends_on:
      - wren-engine
    expose:
      - "8000"
    environment:
      WREN_ENGINE_ENDPOINT: http://wren-engine:${WREN_ENGINE_PORT:-8080}
      LOG_LEVEL: INFO
    volumes:
      - ./infra/wrenai/data:/usr/src/app/data

  qdrant:
    profiles: ["wrenai"]
    image: qdrant/qdrant:v1.11.0
    container_name: lakehouse-wren-qdrant
    pull_policy: always
    platform: ${WREN_PLATFORM:-linux/amd64}
    expose:
      - "6333"
      - "6334"

  wren-ai-service:
    profiles: ["wrenai"]
    image: ghcr.io/canner/wren-ai-service:${WREN_AI_SERVICE_VERSION:-0.29.0}
    container_name: lakehouse-wren-ai-service
    pull_policy: always
    platform: ${WREN_PLATFORM:-linux/amd64}
    depends_on:
      - qdrant
    ports:
      - "${AI_SERVICE_FORWARD_PORT:-5555}:${WREN_AI_SERVICE_PORT:-5555}"
    environment:
      QDRANT_HOST: qdrant
      WREN_UI_ENDPOINT: http://wren-ui:${WREN_UI_PORT:-3000}
      PYTHONUNBUFFERED: "1"
      CONFIG_PATH: /app/config.yaml
    env_file:
      - .env.docker
    volumes:
      - ./infra/wrenai/config.yaml:/app/config.yaml:ro
      - ./infra/wrenai/data:/app/data:ro

  wren-ui:
    profiles: ["wrenai"]
    image: ghcr.io/canner/wren-ui:${WREN_UI_VERSION:-0.32.2}
    container_name: lakehouse-wren-ui
    pull_policy: always
    platform: ${WREN_PLATFORM:-linux/amd64}
    depends_on:
      - wren-engine
      - ibis-server
      - wren-ai-service
    ports:
      - "${HOST_PORT:-3000}:${WREN_UI_PORT:-3000}"
    environment:
      DB_TYPE: sqlite
      SQLITE_FILE: /app/data/db.sqlite3
      PERSIST_CREDENTIAL_DIR: /app/data/.tmp
      WREN_ENGINE_ENDPOINT: http://wren-engine:${WREN_ENGINE_PORT:-8080}
      IBIS_SERVER_ENDPOINT: http://ibis-server:${IBIS_SERVER_PORT:-8000}
      WREN_AI_ENDPOINT: http://wren-ai-service:${WREN_AI_SERVICE_PORT:-5555}
      WREN_AI_SERVICE_ENDPOINT: http://wren-ai-service:${WREN_AI_SERVICE_PORT:-5555}
      EXPERIMENTAL_ENGINE_RUST_VERSION: ${EXPERIMENTAL_ENGINE_RUST_VERSION:-false}
    volumes:
      - wrenai-data:/app/data


volumes:
  minio-data:
  metastore-db-data:
  hive-warehouse:
  wrenai-data:
